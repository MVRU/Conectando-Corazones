name: Code Freeze PR Notice

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  code-freeze-enforcement:
    runs-on: ubuntu-latest

    env:
      FREEZE_AT: "2026-05-01T00:00:00-03:00"
      FREEZE_LABEL: "code-freeze"

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check freeze datetime
        id: freeze
        run: |
          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FREEZE_AT_UTC=$(TZ=UTC date -d "${FREEZE_AT}" +"%Y-%m-%dT%H:%M:%SZ")

          echo "now_utc=${NOW_UTC}" >> "$GITHUB_OUTPUT"
          echo "freeze_at_utc=${FREEZE_AT_UTC}" >> "$GITHUB_OUTPUT"

          if [[ "$(date -d "${NOW_UTC}" +%s)" -ge "$(date -d "${FREEZE_AT_UTC}" +%s)" ]]; then
            echo "frozen=true" >> "$GITHUB_OUTPUT"
          else
            echo "frozen=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enforce code freeze
        if: steps.freeze.outputs.frozen == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;

            if (!pr) {
              core.info("No hay pull_request en el contexto.");
              return;
            }

            const prNumber = pr.number;
            const marker = "<!-- code-freeze-notice -->";
            const freezeLabel = process.env.FREEZE_LABEL;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const alreadyExists = comments.some(comment =>
              comment.body && comment.body.includes(marker)
            );

            const currentLabels = (pr.labels || []).map(label => label.name);
            const hasFreezeLabel = currentLabels.includes(freezeLabel);

            if (!hasFreezeLabel) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: [freezeLabel]
                });
                core.info(`Label '${freezeLabel}' agregado al PR #${prNumber}.`);
              } catch (error) {
                core.warning(`No se pudo agregar el label '${freezeLabel}': ${error.message}`);
              }
            }

            if (!alreadyExists) {
              const body = [
                marker,
                "## 🚫 Code freeze alcanzado",
                "",
                `Desde el **${process.env.FREEZE_AT}** el repositorio se encuentra en **code freeze** de cara a la demo.`,
                "",
                "Este pull request fue **cerrado automáticamente** por política de freeze.",
                "",
                "No se permiten más:",
                "- features nuevas",
                "- cambios de alcance",
                "- modificaciones no críticas sobre el código",
                "",
                "Solo deberían considerarse **fixes críticos y excepcionales**, previa validación explícita del equipo.",
                "",
                "Si este cambio fuera realmente excepcional, debe abrirse un nuevo PR solo después de acordarlo explícitamente."
              ].join("\n");

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });

              core.info(`Comentario de code freeze publicado en PR #${prNumber}.`);
            } else {
              core.info(`El comentario de code freeze ya existía en PR #${prNumber}.`);
            }

            if (pr.state !== "closed") {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                state: "closed"
              });

              core.info(`PR #${prNumber} cerrado automáticamente por code freeze.`);
            } else {
              core.info(`PR #${prNumber} ya estaba cerrado.`);
            }
