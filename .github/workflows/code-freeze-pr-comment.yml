name: Code Freeze PR Notice

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  pull-requests: write
  issues: write

jobs:
  code-freeze-comment:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check freeze date
        id: freeze
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          FREEZE_DATE="2026-05-01"

          echo "freeze_date=$FREEZE_DATE" >> "$GITHUB_OUTPUT"

          if [[ "$TODAY" > "$FREEZE_DATE" || "$TODAY" == "$FREEZE_DATE" ]]; then
            echo "frozen=true" >> "$GITHUB_OUTPUT"
          else
            echo "frozen=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post code freeze comment once
        if: steps.freeze.outputs.frozen == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const marker = "<!-- code-freeze-notice -->";

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const alreadyExists = comments.some(comment =>
              comment.body && comment.body.includes(marker)
            );

            if (alreadyExists) {
              core.info("El comentario de code freeze ya existe en este PR.");
              return;
            }

            const body = [
              marker,
              "## 🚫 Code freeze alcanzado",
              "",
              `Desde el **${{ steps.freeze.outputs.freeze_date }}** el repositorio se considera en **code freeze** de cara a la demo.`,
              "",
              "No se permiten más:",
              "- features nuevas",
              "- cambios de alcance",
              "- modificaciones no críticas sobre el código",
              "",
              "Solo deberían evaluarse **fixes críticos y excepcionales**, previamente revisados y aprobados por el equipo.",
              "",
              "El objetivo es evitar inconsistencias e introducción de errores antes de la demo."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body
            });
