name: Update contribution stats

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - CONTRIBUTION_STATS.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-contributions:
    name: Update contribution stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update contribution stats
        run: node scripts/update-contribution-table.mjs

      - name: Commit contribution stats
        run: |
          if git diff --quiet -- CONTRIBUTION_STATS.md; then
            echo "No contribution stats changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add CONTRIBUTION_STATS.md
          git commit -m "docs: actualizar estadísticas de contribución técnica"
          git push
