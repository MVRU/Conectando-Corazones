name: PR Reminder Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
  pull_request:
    types: [labeled]

jobs:
  remind:
    runs-on: ubuntu-latest

    env:
      CORE_TEAM: '["MVRU","TomasAlvarez0","AleSklate0807"]'
      TARGET_LABEL: "ready-for-review"

    permissions:
      pull-requests: write
      issues: write
      contents: write

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run PR Reminder
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const now = new Date();

            const DEMO_DEADLINE = new Date("2026-03-30T16:00:00-03:00");
            const hoursToDeadline = (DEMO_DEADLINE - now) / (1000 * 60 * 60);

            if (hoursToDeadline <= 0) {
              console.log("Deadline alcanzado. Bot detenido.");
              return;
            }

            const CORE_TEAM = JSON.parse(process.env.CORE_TEAM);
            const TARGET_LABEL = process.env.TARGET_LABEL;

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100
            });

            for (const pr of prs) {
              if (!pr || pr.draft || pr.user?.type === 'Bot') continue;

              if (pr.state !== "open" || pr.merged) continue;

              const prNumber = pr.number;
              const author = pr.user.login.toLowerCase();
              const labels = (pr.labels || []).map(l => l.name);

              // ================================
              // AUTO-READY-FOR-REVIEW
              // ================================
              if (!labels.includes(TARGET_LABEL)) {
                console.log(`PR #${prNumber} sin ready-for-review → asignando automáticamente`);

                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: prNumber,
                    labels: [TARGET_LABEL]
                  });

                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: prNumber,
                    body: `🤖 Este PR estaba abierto y no marcado como \`ready-for-review\`.

            Se asume listo para revisión y se activa el flujo automáticamente.`
                  });

                } catch (e) {
                  console.error(`Error asignando label en PR #${prNumber}: ${e.message}`);
                }

                continue;
              }

              // ================================
              // REVIEWS
              // ================================
              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                { owner, repo, pull_number: prNumber }
              );

              const latestReviewByUser = {};
              for (const review of reviews) {
                if (!review.user) continue;

                const user = review.user.login.toLowerCase();
                const submittedAt = new Date(review.submitted_at || 0);

                if (
                  !latestReviewByUser[user] ||
                  new Date(latestReviewByUser[user].submitted_at) < submittedAt
                ) {
                  latestReviewByUser[user] = review;
                }
              }

              const reviewersWhoCompleted = Object.values(latestReviewByUser)
                .map(r => r.user.login.toLowerCase());

              const hasBlockingReview = Object.values(latestReviewByUser)
                .some(r => r.state === 'CHANGES_REQUESTED');

              const hasMVRUApproval = Object.values(latestReviewByUser)
                .some(r =>
                  r.user.login.toLowerCase() === 'mvru' &&
                  r.state === 'APPROVED'
                );

              // ================================
              // REVIEWERS PENDIENTES
              // ================================
              let pendingReviewers = (pr.requested_reviewers || [])
                .map(r => r.login)
                .filter(r => !reviewersWhoCompleted.includes(r.toLowerCase()));

              if (pendingReviewers.length === 0) {
                pendingReviewers = CORE_TEAM.filter(u =>
                  u.toLowerCase() !== author &&
                  !reviewersWhoCompleted.includes(u.toLowerCase())
                );
              }

              if (pendingReviewers.length === 0) continue;

              const reviewersStr = pendingReviewers.map(u => `@${u}`).join(" ");

              // ================================
              // EVENTO INMEDIATO
              // ================================
              const justLabeled =
                context.eventName === "pull_request" &&
                context.payload.action === "labeled" &&
                context.payload.label?.name === TARGET_LABEL &&
                context.payload.pull_request?.number === prNumber;

              if (justLabeled) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: `🚀 PR listo para review\n\n${reviewersStr}`
                });

                continue;
              }

              // ================================
              // COOLDOWN
              // ================================
              const comments = await github.paginate(
                github.rest.issues.listComments,
                { owner, repo, issue_number: prNumber }
              );

              const lastBotComment = comments
                .filter(c => c.user.type === 'Bot')
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

              const hoursSinceLastComment = lastBotComment
                ? (now - new Date(lastBotComment.created_at)) / (1000 * 60 * 60)
                : Infinity;

              // ================================
              // MERGE STATUS (con retry)
              // ================================
              let prDetails = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber
              });

              let isMergeable = prDetails.data.mergeable;

              if (isMergeable === null) {
                console.log(`Recalculando mergeable para PR #${prNumber}...`);
                await new Promise(resolve => setTimeout(resolve, 2000));

                const retry = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: prNumber
                });

                isMergeable = retry.data.mergeable;
              }

              isMergeable = isMergeable === true;

              // ================================
              // STATUS CHECKS (CI real)
              // ================================
              const checks = await github.rest.checks.listForRef({
                owner,
                repo,
                ref: pr.head.sha
              });

              const checkRuns = checks.data.check_runs;

              const allChecksPassed =
                checkRuns.length > 0 &&
                checkRuns.every(
                  c => c.status === "completed" && c.conclusion === "success"
                );

              // ================================
              // AUTO-MERGE CRÍTICO
              // ================================
              if (
                hoursToDeadline < 12 &&
                hasMVRUApproval &&
                !hasBlockingReview &&
                isMergeable &&
                allChecksPassed
              ) {
                try {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: prNumber,
                    body: `🤖 Auto-merge ejecutado

            Condiciones cumplidas:
            - Sin cambios solicitados
            - Sin conflictos
            - CI exitoso
            - Ventana crítica pre-demo`
                  });

                  await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number: prNumber,
                    merge_method: "squash"
                  });

                  console.log(`PR #${prNumber} mergeado automáticamente`);
                  continue;

                } catch (e) {
                  console.error(`Error auto-merge PR #${prNumber}: ${e.message}`);
                }
              }

              // ================================
              // RECORDATORIOS
              // ================================
              if (hoursSinceLastComment < 6 && hoursToDeadline >= 12) continue;

              let body = "";

              if (hoursToDeadline < 12) {
                body = `🚨 CRÍTICO

            ${reviewersStr}

            Escalado a @MVRU`;
              } else if (hoursToDeadline < 36) {
                body = `⚠️ PRIORITARIO

            ${reviewersStr}`;
              } else {
                body = `⏰ Reminder

            ${reviewersStr}`;
              }

              if (hoursToDeadline < 36 && !labels.includes("needs-focus")) {
                try {
                  await github.rest.issues.addLabels({
                    owner,
                    repo,
                    issue_number: prNumber,
                    labels: ["needs-focus"]
                  });
                } catch (e) {
                  console.error(`Error agregando labels en PR #${prNumber}: ${e.message}`);
                }
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }

            console.log("Finalizado.");
